<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataList</title>
</head>
<body>
    <form action="">
        <input list="color" placeholder="choose a color">
        <datalist id="color">
            <option>Red</option>
            <option>Blue</option>
            <option>Green</option>

        </datalist>
    </form>
</body>
</html>
